<svg xmlns="http://www.w3.org/2000/svg" width="1180" height="520" viewBox="0 0 1180 520">
  <rect width="1180" height="520" fill="#ffffff"/>
  <text x="36" y="42" font-size="24" font-weight="700" fill="#172033">Energy partition: why heat production overpredicts H2 without pore-scale attenuation</text>
  <line x1="160.0" y1="100" x2="160.0" y2="330" stroke="#e2e8f0"/>
  <text x="160.0" y="352" text-anchor="middle" font-size="12" fill="#475569">10^-1</text>
  <line x1="318.0" y1="100" x2="318.0" y2="330" stroke="#e2e8f0"/>
  <text x="318.0" y="352" text-anchor="middle" font-size="12" fill="#475569">10^0</text>
  <line x1="476.0" y1="100" x2="476.0" y2="330" stroke="#e2e8f0"/>
  <text x="476.0" y="352" text-anchor="middle" font-size="12" fill="#475569">10^1</text>
  <line x1="634.0" y1="100" x2="634.0" y2="330" stroke="#e2e8f0"/>
  <text x="634.0" y="352" text-anchor="middle" font-size="12" fill="#475569">10^2</text>
  <line x1="792.0" y1="100" x2="792.0" y2="330" stroke="#e2e8f0"/>
  <text x="792.0" y="352" text-anchor="middle" font-size="12" fill="#475569">10^3</text>
  <line x1="950.0" y1="100" x2="950.0" y2="330" stroke="#e2e8f0"/>
  <text x="950.0" y="352" text-anchor="middle" font-size="12" fill="#475569">10^4</text>
  <text x="48" y="158" font-size="15" fill="#172033">All radiogenic energy to water</text>
  <rect x="160" y="132" width="663.5918519946989" height="78" fill="#0f766e" opacity="0.82"/>
  <text x="835.5918519946989" y="179" font-size="15" fill="#172033">1.585e+03 nmol m-3 yr-1</text>
  <text x="48" y="278" font-size="15" fill="#172033">Revell low-porosity calibrated</text>
  <rect x="160" y="252" width="190.04252202984839" height="78" fill="#b45309" opacity="0.82"/>
  <text x="362.0425220298484" y="299" font-size="15" fill="#172033">1.595 nmol m-3 yr-1</text>
  <text x="48" y="424" font-size="16" fill="#172033">Effective water-accessible energy fraction = 1.007e-03.</text>
  <text x="48" y="452" font-size="14" fill="#475569">This is not a universal constant; it back-calculates the attenuation needed for the public Revell H2 rate.</text>
</svg>
