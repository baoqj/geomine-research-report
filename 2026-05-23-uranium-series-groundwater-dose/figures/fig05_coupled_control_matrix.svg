<text x="165.0" y="382.0" font-size="15" font-family="Arial, sans-serif" fill="#102030" text-anchor="middle" font-weight="700">反应地球化学</text>
<text x="165.0" y="415.0" font-size="11" font-family="Arial, sans-serif" fill="#344" text-anchor="middle" font-weight="400">PHREEQC: 络合、饱和指数、吸附/共沉淀</text>
<rect x="295" y="350" width="190" height="105" rx="7" fill="#fff" stroke="#9aa7b3"/>
<text x="390.0" y="382.0" font-size="15" font-family="Arial, sans-serif" fill="#102030" text-anchor="middle" font-weight="700">裂隙迁移</text>
<text x="390.0" y="415.0" font-size="11" font-family="Arial, sans-serif" fill="#344" text-anchor="middle" font-weight="400">对流-弥散-滞留 + Bateman 生成/衰变</text>
<rect x="520" y="350" width="190" height="105" rx="7" fill="#fff" stroke="#9aa7b3"/>
<text x="615.0" y="382.0" font-size="15" font-family="Arial, sans-serif" fill="#102030" text-anchor="middle" font-weight="700">剂量评价</text>
<text x="615.0" y="415.0" font-size="11" font-family="Arial, sans-serif" fill="#344" text-anchor="middle" font-weight="400">饮水摄入、释氡吸入、食物/沉积累积</text>
<rect x="745" y="350" width="190" height="105" rx="7" fill="#fff" stroke="#9aa7b3"/>
<text x="840.0" y="382.0" font-size="15" font-family="Arial, sans-serif" fill="#102030" text-anchor="middle" font-weight="700">不确定性</text>
<text x="840.0" y="415.0" font-size="11" font-family="Arial, sans-serif" fill="#344" text-anchor="middle" font-weight="400">左删失、季节性、K_d、停留时间、端元混合</text>
<text x="70.0" y="515.0" font-size="13" font-family="Arial, sans-serif" fill="#223" text-anchor="start" font-weight="400">论文观点：安全评价应把衰变链核素作为耦合系统处理；总 U 只能描述一个源项维度，不能替代 Ra/Rn/Pb/Po 的剂量与迁移评价。</text>
