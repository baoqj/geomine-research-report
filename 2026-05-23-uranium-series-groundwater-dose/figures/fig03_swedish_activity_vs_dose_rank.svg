<text x="85.0" y="440.0" font-size="13" font-family="Arial, sans-serif" fill="#223" text-anchor="start" font-weight="400">关键对齐：U-234 与 U-238 的平均活度不低，但剂量排序低于 Pb-210、Ra-228、Po-210 与 Ra-226。</text>
<text x="85.0" y="465.0" font-size="13" font-family="Arial, sans-serif" fill="#223" text-anchor="start" font-weight="400">解释：剂量由活度、摄入量与核素剂量系数共同决定；迁移由各元素化学行为控制，而非由总 U 单变量决定。</text>
