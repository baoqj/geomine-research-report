<text x="80.0" y="245.0" font-size="14" font-family="Arial, sans-serif" fill="#223" text-anchor="start" font-weight="400">关键推论：同一衰变链中的核素具有不同化学形态；因此活度平衡、迁移性与剂量贡献不会自动随总 U 同步变化。</text>
<text x="80.0" y="278.0" font-size="14" font-family="Arial, sans-serif" fill="#223" text-anchor="start" font-weight="400">模型入口：Bateman 生成项 + 水化学反应项 + 裂隙迁移/滞留项 + 摄入/吸入剂量项。</text>
