<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="620" viewBox="0 0 1000 620">
  <style>
    text { font-family: Arial, Helvetica, sans-serif; fill: #17202a; }
    .small { font-size: 13px; }
    .label { font-size: 15px; font-weight: 600; }
    .title { font-size: 19px; font-weight: 700; }
    .caveat { font-size: 12px; fill: #5f6b72; }
  </style>
  <rect x="0" y="0" width="1000" height="620" fill="#ffffff"/>
  <text x="40" y="45" class="title">Prioritized sensitivity-analysis design for first PFLOTRAN runs</text>
  <text x="60" y="130" class="small">Pyrite oxidation rate</text>
  <rect x="380" y="105" width="446.5" height="30" fill="#c0392b" opacity="0.82"/>
  <text x="838.5" y="127" class="small">0.95</text>
  <text x="60" y="182" class="small">Carbonate neutralization capacity</text>
  <rect x="380" y="157" width="385.4" height="30" fill="#c0392b" opacity="0.82"/>
  <text x="777.4" y="179" class="small">0.82</text>
  <text x="60" y="234" class="small">Seepage flux / hydraulic gradient</text>
  <rect x="380" y="209" width="366.6" height="30" fill="#c0392b" opacity="0.82"/>
  <text x="758.6" y="231" class="small">0.78</text>
  <text x="60" y="286" class="small">Fe-Mn oxide sorption capacity</text>
  <rect x="380" y="261" width="310.2" height="30" fill="#2f80b7" opacity="0.82"/>
  <text x="702.2" y="283" class="small">0.66</text>
  <text x="60" y="338" class="small">Dispersivity</text>
  <rect x="380" y="313" width="225.6" height="30" fill="#2f80b7" opacity="0.82"/>
  <text x="617.6" y="335" class="small">0.48</text>
  <text x="60" y="390" class="small">Redox boundary location</text>
  <rect x="380" y="365" width="206.8" height="30" fill="#2f80b7" opacity="0.82"/>
  <text x="598.8" y="387" class="small">0.44</text>
  <text x="60" y="442" class="small">Barite/Ra thermodynamic support</text>
  <rect x="380" y="417" width="183.3" height="30" fill="#2f80b7" opacity="0.82"/>
  <text x="575.3" y="439" class="small">0.39</text>
  <text x="60" y="494" class="small">Permeability anisotropy</text>
  <rect x="380" y="469" width="155.1" height="30" fill="#2f80b7" opacity="0.82"/>
  <text x="547.1" y="491" class="small">0.33</text>
  <line x1="380" y1="535" x2="850" y2="535" stroke="#34495e" stroke-width="1.5"/>
  <text x="515" y="570" class="label">Relative priority score for uncertainty reduction</text>
  <text x="40" y="602" class="caveat">Ranking is an expert design aid derived from mechanism criticality, not a variance-based result from executed simulations.</text>
</svg>
