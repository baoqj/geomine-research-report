<svg xmlns="http://www.w3.org/2000/svg" width="1050" height="620" viewBox="0 0 1050 620">
  <style>
    text { font-family: Arial, Helvetica, sans-serif; fill: #17202a; }
    .small { font-size: 13px; }
    .label { font-size: 15px; font-weight: 600; }
    .title { font-size: 19px; font-weight: 700; }
    .caveat { font-size: 12px; fill: #5f6b72; }
  </style>
  <rect x="0" y="0" width="1050" height="620" fill="#fbfcfd"/>
  <text x="40" y="45" class="title">Geochemical reaction-network design for PHREEQC prototype and PFLOTRAN transfer</text>
  <rect x="60" y="100" rx="8" ry="8" width="190" height="82" fill="#f6c6bd" stroke="#50616b" stroke-width="1.6"/>
  <text x="78" y="138" class="label">Sulfide oxidation</text>
  <rect x="310" y="100" rx="8" ry="8" width="190" height="82" fill="#ffd99a" stroke="#50616b" stroke-width="1.6"/>
  <text x="328" y="138" class="label">Acid + sulfate</text>
  <rect x="560" y="100" rx="8" ry="8" width="190" height="82" fill="#d5efc2" stroke="#50616b" stroke-width="1.6"/>
  <text x="578" y="138" class="label">Carbonate buffering</text>
  <rect x="810" y="100" rx="8" ry="8" width="190" height="82" fill="#d7d7d7" stroke="#50616b" stroke-width="1.6"/>
  <text x="828" y="138" class="label">Fe/Al hydroxides</text>
  <rect x="205" y="300" rx="8" ry="8" width="190" height="82" fill="#d7c5f0" stroke="#50616b" stroke-width="1.6"/>
  <text x="223" y="338" class="label">U(VI) carbonate</text>
  <rect x="455" y="300" rx="8" ry="8" width="190" height="82" fill="#c8e7f7" stroke="#50616b" stroke-width="1.6"/>
  <text x="473" y="338" class="label">Ra sulfate/barite</text>
  <rect x="705" y="300" rx="8" ry="8" width="190" height="82" fill="#dce5c2" stroke="#50616b" stroke-width="1.6"/>
  <text x="723" y="338" class="label">Fe-Mn oxide sorption</text>
  <rect x="455" y="480" rx="8" ry="8" width="190" height="82" fill="#f3f3f3" stroke="#50616b" stroke-width="1.6"/>
  <text x="473" y="518" class="label">Downgradient plumes</text>
  <defs><marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L0,6 L9,3 z" fill="#50616b"/></marker></defs>
  <path d="M250 141 L310 141" fill="none" stroke="#c0392b" stroke-width="3" marker-end="url(#arrow)"/>
  <path d="M500 141 L560 141" fill="none" stroke="#d35400" stroke-width="3" marker-end="url(#arrow)"/>
  <path d="M750 141 L810 141" fill="none" stroke="#7f8c8d" stroke-width="3" marker-end="url(#arrow)"/>
  <path d="M405 183 L300 300" fill="none" stroke="#8e44ad" stroke-width="3" marker-end="url(#arrow)"/>
  <path d="M455 183 L520 300" fill="none" stroke="#2980b9" stroke-width="3" marker-end="url(#arrow)"/>
  <path d="M850 183 L785 300" fill="none" stroke="#4d7f35" stroke-width="3" marker-end="url(#arrow)"/>
  <path d="M300 382 L500 480" fill="none" stroke="#8e44ad" stroke-width="3" marker-end="url(#arrow)"/>
  <path d="M550 382 L560 480" fill="none" stroke="#2980b9" stroke-width="3" marker-end="url(#arrow)"/>
  <path d="M790 382 L650 480" fill="none" stroke="#4d7f35" stroke-width="3" marker-end="url(#arrow)"/>
  <text x="52" y="590" class="caveat">Constants for kinetics, thermodynamics, surface complexation, and ion exchange are placeholders until database/lab calibration is supplied.</text>
